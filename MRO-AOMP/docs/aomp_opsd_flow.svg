<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="5" stdDeviation="3" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <marker id="blueArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#233ec9"/>
    </marker>
    <marker id="greenArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5b1b"/>
    </marker>
    <style>
      .title { font: 700 34px "Comic Sans MS", "Trebuchet MS", Arial, sans-serif; fill: #111111; }
      .stageTitle { font: 700 30px "Comic Sans MS", "Trebuchet MS", Arial, sans-serif; }
      .boxTitle { font: 700 30px "Comic Sans MS", "Trebuchet MS", Arial, sans-serif; fill: #050505; }
      .boxText { font: 600 20px "Comic Sans MS", "Trebuchet MS", Arial, sans-serif; fill: #050505; }
      .smallText { font: 600 17px "Comic Sans MS", "Trebuchet MS", Arial, sans-serif; fill: #242424; }
      .formula { font: 700 20px "Trebuchet MS", Arial, sans-serif; fill: #111111; }
      .panelBlue { fill: #f5f7ff; stroke: #2f45d8; stroke-width: 3; stroke-dasharray: 10 9; }
      .panelGreen { fill: #f7fff4; stroke: #275f22; stroke-width: 3; stroke-dasharray: 10 9; }
      .panelPink { fill: #fffafa; stroke: #f0c7c1; stroke-width: 3; stroke-dasharray: 10 9; }
      .nodeBlue { fill: #dfeaff; stroke: #b2c3ff; stroke-width: 3; filter: url(#shadow); }
      .nodeGreen { fill: #dfeddb; stroke: #c5ddc2; stroke-width: 3; filter: url(#shadow); }
      .nodeYellow { fill: #fff6d8; stroke: #d5bd6e; stroke-width: 3; filter: url(#shadow); }
      .nodeWhite { fill: #ffffff; stroke: #bfbfbf; stroke-width: 3; filter: url(#shadow); }
      .nodePink { fill: #ffd7d6; stroke: #ffd7d6; stroke-width: 2; }
      .nodePeach { fill: #fee9dc; stroke: #fee9dc; stroke-width: 2; }
      .nodeMint { fill: #dcefdc; stroke: #dcefdc; stroke-width: 2; }
      .arrow { stroke: #111111; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: #233ec9; stroke-width: 3; fill: none; marker-end: url(#blueArrow); }
      .arrowGreen { stroke: #1f5b1b; stroke-width: 3; fill: none; marker-end: url(#greenArrow); }
      .thin { stroke-width: 2.3; }
      .note { fill: #fff4ca; stroke: #e1ca75; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1680" height="980" fill="#ffffff"/>
  <text x="840" y="45" text-anchor="middle" class="title">Current AOMP-OPSD Training Flow</text>

  <!-- Read-only reuse panel -->
  <rect x="35" y="85" width="635" height="205" rx="14" class="panelPink"/>
  <text x="355" y="124" text-anchor="middle" class="stageTitle" fill="#9b3d37">Read-only MRO-SI Reuse</text>
  <rect x="80" y="150" width="170" height="58" rx="8" class="nodePink"/>
  <text x="165" y="187" text-anchor="middle" class="boxText">Collator</text>
  <rect x="285" y="150" width="170" height="58" rx="8" class="nodePeach"/>
  <text x="370" y="187" text-anchor="middle" class="boxText">OPSD/JSD</text>
  <rect x="490" y="150" width="135" height="58" rx="8" class="nodeMint"/>
  <text x="558" y="187" text-anchor="middle" class="boxText">Verifier</text>
  <text x="355" y="247" text-anchor="middle" class="smallText">aomp_opsd imports MRO-SI helpers; original code is unchanged</text>

  <!-- Main input chain -->
  <rect x="38" y="390" width="170" height="108" rx="8" class="nodeWhite"/>
  <text x="123" y="432" text-anchor="middle" class="boxTitle">Problem</text>
  <text x="123" y="465" text-anchor="middle" class="boxTitle">x</text>

  <rect x="260" y="390" width="172" height="108" rx="8" class="nodeYellow"/>
  <text x="346" y="430" text-anchor="middle" class="boxTitle">Student</text>
  <text x="346" y="464" text-anchor="middle" class="boxText">pi_z</text>

  <rect x="486" y="390" width="172" height="108" rx="8" class="nodeWhite"/>
  <text x="572" y="432" text-anchor="middle" class="boxTitle">Rollout</text>
  <text x="572" y="465" text-anchor="middle" class="boxText">y ~ pi_z</text>

  <path d="M208 444 L260 444" class="arrow"/>
  <path d="M432 444 L486 444" class="arrow"/>

  <!-- Fast proxy channel -->
  <rect x="705" y="85" width="940" height="300" rx="14" class="panelBlue"/>
  <text x="1495" y="125" text-anchor="middle" class="stageTitle" fill="#2037c5">Channel 1: Fast Proxy Hint</text>

  <rect x="735" y="145" width="315" height="90" rx="10" class="nodeBlue"/>
  <text x="893" y="184" text-anchor="middle" class="boxTitle">Masked Teacher</text>
  <text x="893" y="214" text-anchor="middle" class="boxText">teacher / EMA / adapter-off</text>

  <rect x="735" y="280" width="315" height="84" rx="10" class="nodeBlue"/>
  <text x="893" y="315" text-anchor="middle" class="boxTitle">Token Targets</text>
  <text x="893" y="344" text-anchor="middle" class="boxText">dense KL/JSD per response token</text>

  <rect x="1112" y="248" width="245" height="96" rx="10" class="nodeBlue"/>
  <text x="1235" y="286" text-anchor="middle" class="boxTitle">L_proxy(z_t)</text>
  <text x="1235" y="318" text-anchor="middle" class="boxText">cheap OPSD loss</text>

  <rect x="1428" y="248" width="180" height="96" rx="10" class="nodeBlue"/>
  <text x="1518" y="286" text-anchor="middle" class="boxTitle">h_t</text>
  <text x="1518" y="318" text-anchor="middle" class="boxText">grad proxy</text>

  <path d="M658 420 C690 420 690 325 735 325" class="arrowBlue"/>
  <path d="M893 235 L893 280" class="arrowBlue"/>
  <path d="M1050 322 L1112 296" class="arrowBlue"/>
  <path d="M1357 296 L1428 296" class="arrowBlue"/>

  <!-- Lookahead bridge -->
  <rect x="1260" y="425" width="310" height="88" rx="10" class="nodeYellow"/>
  <text x="1415" y="461" text-anchor="middle" class="boxTitle">Virtual Lookahead</text>
  <text x="1415" y="493" text-anchor="middle" class="formula">w_t = z_t - eta_h h_t</text>
  <path d="M1518 344 C1518 385 1470 394 1445 425" class="arrowBlue"/>
  <rect x="1238" y="535" width="350" height="54" rx="8" class="note"/>
  <text x="1413" y="568" text-anchor="middle" class="smallText">temporary params only; restore z_t before optimizer step</text>

  <!-- Audit channel -->
  <rect x="705" y="610" width="940" height="300" rx="14" class="panelGreen"/>
  <text x="865" y="651" text-anchor="middle" class="stageTitle" fill="#275f22">Channel 2: Outcome-Audited Lookahead</text>

  <rect x="735" y="690" width="205" height="96" rx="10" class="nodeGreen"/>
  <text x="838" y="727" text-anchor="middle" class="boxTitle">Lookahead</text>
  <text x="838" y="759" text-anchor="middle" class="boxText">rollout K samples</text>

  <rect x="990" y="690" width="190" height="96" rx="10" class="nodeGreen"/>
  <text x="1085" y="727" text-anchor="middle" class="boxTitle">Audit</text>
  <text x="1085" y="759" text-anchor="middle" class="boxText">verifier / exact match</text>

  <rect x="1228" y="690" width="190" height="96" rx="10" class="nodeGreen"/>
  <text x="1323" y="725" text-anchor="middle" class="boxTitle">Group Adv.</text>
  <text x="1323" y="756" text-anchor="middle" class="boxText">A_i from R_i</text>

  <rect x="1455" y="690" width="160" height="96" rx="10" class="nodeGreen"/>
  <text x="1535" y="725" text-anchor="middle" class="boxTitle">Route</text>
  <text x="1535" y="756" text-anchor="middle" class="boxText">pos / neg</text>

  <path d="M1415 513 C1415 585 838 610 838 690" class="arrowGreen"/>
  <path d="M940 738 L990 738" class="arrowGreen"/>
  <path d="M1180 738 L1228 738" class="arrowGreen"/>
  <path d="M1418 738 L1455 738" class="arrowGreen"/>

  <!-- Positive and negative paths -->
  <rect x="735" y="825" width="325" height="64" rx="10" class="nodeGreen"/>
  <text x="898" y="851" text-anchor="middle" class="boxText">Positive path: A_i &gt; 0</text>
  <text x="898" y="875" text-anchor="middle" class="smallText">self-distill NLL; weight uncertain tokens</text>

  <rect x="1090" y="825" width="355" height="64" rx="10" class="nodeGreen"/>
  <text x="1268" y="851" text-anchor="middle" class="boxText">Negative path: A_i &lt; 0</text>
  <text x="1268" y="875" text-anchor="middle" class="smallText">teacher KL; reliable high-disagreement prefixes</text>

  <rect x="1480" y="825" width="135" height="64" rx="10" class="nodeGreen"/>
  <text x="1548" y="851" text-anchor="middle" class="boxText">L_audit</text>
  <text x="1548" y="875" text-anchor="middle" class="smallText">at w_t</text>

  <path d="M1535 786 C1495 812 1110 805 1000 825" class="arrowGreen thin"/>
  <path d="M1535 786 C1495 812 1360 812 1320 825" class="arrowGreen thin"/>
  <path d="M1060 857 L1090 857" class="arrowGreen thin"/>
  <path d="M1445 857 L1480 857" class="arrowGreen thin"/>

  <!-- Final update -->
  <rect x="124" y="680" width="215" height="92" rx="10" class="nodeYellow"/>
  <text x="232" y="717" text-anchor="middle" class="boxTitle">Final Update</text>
  <text x="232" y="749" text-anchor="middle" class="formula">g_t = grad L_audit(w_t)</text>

  <rect x="420" y="680" width="215" height="92" rx="10" class="nodeYellow"/>
  <text x="528" y="717" text-anchor="middle" class="boxTitle">New Student</text>
  <text x="528" y="749" text-anchor="middle" class="formula">z_{t+1}</text>

  <path d="M1480 857 C980 955 375 875 260 772" class="arrowGreen"/>
  <path d="M339 726 L420 726" class="arrow"/>

  <!-- Method claim note -->
  <rect x="55" y="835" width="580" height="78" rx="10" fill="#ffffff" stroke="#333333" stroke-width="2"/>
  <text x="345" y="866" text-anchor="middle" class="boxText">Outcome is not split into token rewards</text>
  <text x="345" y="895" text-anchor="middle" class="smallText">R_i routes trajectories; OPSD supplies dense token supervision</text>
</svg>
